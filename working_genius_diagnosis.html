<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Types of Working Genius</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    min-height: 100vh;
    color: #1f2937;
    padding: 20px;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #1e3a8a, #3b82f6);
    color: #fff;
    padding: 28px 28px 36px;
    text-align: center;
    position: relative;
  }
  header h1 { font-size: 1.9rem; margin-bottom: 8px; letter-spacing: 0.02em; }
  header p { opacity: 0.92; font-size: 0.95rem; }

  .lang-switcher {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 18px;
  }
  .lang-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.4);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .lang-btn:hover { background: rgba(255,255,255,0.28); }
  .lang-btn.active {
    background: #fff;
    color: #1e3a8a;
    border-color: #fff;
  }

  .content { padding: 32px 28px; }
  .intro h2 { color: #1e3a8a; margin-bottom: 14px; font-size: 1.4rem; }
  .intro p { line-height: 1.7; margin-bottom: 12px; color: #374151; }
  .gears-preview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin: 24px 0;
  }
  .gear-card {
    background: #f3f4f6;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    border-top: 4px solid #3b82f6;
  }
  .gear-card .letter {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1e3a8a;
  }
  .gear-card .name { font-size: 0.85rem; color: #4b5563; margin-top: 4px; line-height: 1.4; }
  .btn {
    background: #1e3a8a;
    color: #fff;
    border: none;
    padding: 14px 28px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-block;
  }
  .btn:hover { background: #1e40af; transform: translateY(-2px); }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: #fff;
    color: #1e3a8a;
    border: 2px solid #1e3a8a;
  }
  .btn-secondary:hover { background: #eff6ff; }
  .center { text-align: center; margin-top: 24px; }

  .progress-bar {
    height: 8px;
    background: #e5e7eb;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #1e3a8a);
    transition: width 0.3s;
  }
  .question-counter {
    color: #6b7280;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 1.15rem;
    color: #1f2937;
    margin-bottom: 24px;
    line-height: 1.6;
    font-weight: 500;
  }
  .scale {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .scale-btn {
    padding: 16px 8px;
    border: 2px solid #e5e7eb;
    background: #fff;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-size: 0.8rem;
    color: #4b5563;
    line-height: 1.3;
  }
  .scale-btn:hover { border-color: #3b82f6; background: #eff6ff; }
  .scale-btn.selected {
    border-color: #1e3a8a;
    background: #1e3a8a;
    color: #fff;
    transform: scale(1.05);
  }
  .scale-btn .num { display: block; font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
  }

  .result-hero {
    text-align: center;
    padding: 20px 0 28px;
  }
  .result-hero h2 {
    color: #1e3a8a;
    font-size: 1.6rem;
    margin-bottom: 8px;
  }
  .result-hero p { color: #6b7280; }

  .ranking { margin: 24px 0; }
  .rank-section { margin-bottom: 28px; }
  .rank-section h3 {
    color: #1e3a8a;
    font-size: 1.15rem;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid #e5e7eb;
  }
  .rank-section .section-desc {
    color: #6b7280;
    font-size: 0.88rem;
    margin-bottom: 12px;
  }
  .rank-item {
    background: #f9fafb;
    border-left: 5px solid #3b82f6;
    padding: 16px 18px;
    margin-bottom: 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .rank-item.genius { border-left-color: #16a34a; background: #f0fdf4; }
  .rank-item.competency { border-left-color: #f59e0b; background: #fffbeb; }
  .rank-item.frustration { border-left-color: #dc2626; background: #fef2f2; }
  .rank-letter {
    font-size: 2rem;
    font-weight: 800;
    color: #1e3a8a;
    min-width: 40px;
    text-align: center;
  }
  .rank-info { flex: 1; }
  .rank-info .title {
    font-weight: 700;
    font-size: 1.05rem;
    color: #1f2937;
    margin-bottom: 4px;
  }
  .rank-info .desc {
    font-size: 0.88rem;
    color: #4b5563;
    line-height: 1.5;
  }
  .rank-score {
    font-size: 0.9rem;
    color: #6b7280;
    font-weight: 600;
  }

  .chart-container {
    background: #f9fafb;
    padding: 20px;
    border-radius: 10px;
    margin: 20px 0;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 50px;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
  }
  .bar-label { font-weight: 600; color: #374151; font-size: 0.9rem; }
  .bar-track {
    height: 24px;
    background: #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #1e3a8a);
    border-radius: 12px;
    transition: width 0.8s ease-out;
  }
  .bar-value { text-align: right; font-weight: 600; color: #1e3a8a; font-size: 0.9rem; }

  .summary-box {
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    border-radius: 10px;
    padding: 20px;
    margin: 20px 0;
    border-left: 5px solid #1e3a8a;
  }
  .summary-box h4 { color: #1e3a8a; margin-bottom: 8px; }
  .summary-box p { line-height: 1.7; color: #374151; }

  .hidden { display: none; }

  /* ============ パスワード画面 ============ */
  .gate-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
  }
  .gate-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .gate-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .gate-card h2 {
    color: #1e3a8a;
    margin-bottom: 10px;
    font-size: 1.4rem;
  }
  .gate-card p {
    color: #6b7280;
    font-size: 0.95rem;
    margin-bottom: 22px;
    line-height: 1.6;
  }
  .gate-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    font-size: 1.1rem;
    text-align: center;
    letter-spacing: 0.15em;
    margin-bottom: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .gate-input:focus {
    outline: none;
    border-color: #1e3a8a;
  }
  .gate-error {
    color: #dc2626;
    font-size: 0.88rem;
    min-height: 1.2em;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .gate-lang {
    margin-top: 18px;
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .gate-lang .lang-btn {
    background: #f3f4f6;
    color: #4b5563;
    border-color: #d1d5db;
  }
  .gate-lang .lang-btn.active {
    background: #1e3a8a;
    color: #fff;
    border-color: #1e3a8a;
  }

  /* ============ チームマップ関連 ============ */
  .intro-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 24px;
  }
  .share-section {
    background: linear-gradient(135deg, #ecfdf5, #d1fae5);
    border-radius: 10px;
    padding: 18px 20px;
    margin: 20px 0;
    border-left: 5px solid #059669;
  }
  .share-section h4 { color: #065f46; margin-bottom: 10px; font-size: 1rem; }
  .share-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .share-input-row input {
    flex: 1;
    min-width: 200px;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  .share-input-row input:focus { outline: none; border-color: #1e3a8a; }
  .share-code {
    background: #fff;
    border: 1.5px dashed #059669;
    border-radius: 6px;
    padding: 12px 14px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 0.88rem;
    color: #065f46;
    word-break: break-all;
    margin-bottom: 8px;
    user-select: all;
  }
  .copy-msg {
    color: #059669;
    font-size: 0.85rem;
    font-weight: 600;
    margin-top: 4px;
    min-height: 1.2em;
  }
  .btn-small {
    padding: 8px 16px;
    font-size: 0.88rem;
  }
  .btn-danger {
    background: #fff;
    color: #dc2626;
    border: 1.5px solid #dc2626;
  }
  .btn-danger:hover { background: #fef2f2; }

  /* チームマップ画面 */
  .team-add-box {
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .team-add-box h3 { color: #1e3a8a; margin-bottom: 12px; font-size: 1.05rem; }
  .team-empty {
    text-align: center;
    padding: 40px 20px;
    color: #9ca3af;
    background: #f9fafb;
    border-radius: 10px;
    border: 2px dashed #e5e7eb;
  }
  .team-matrix {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 16px 0;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .team-matrix th, .team-matrix td {
    padding: 12px 8px;
    text-align: center;
    font-size: 0.9rem;
    border-bottom: 1px solid #e5e7eb;
  }
  .team-matrix th {
    background: #1e3a8a;
    color: #fff;
    font-weight: 600;
    font-size: 0.95rem;
    position: sticky;
    top: 0;
  }
  .team-matrix th:first-child {
    text-align: left;
    padding-left: 14px;
  }
  .team-matrix td:first-child {
    text-align: left;
    padding-left: 14px;
    font-weight: 600;
    color: #1f2937;
  }
  .team-matrix tr:last-child td { border-bottom: none; }
  .team-matrix tr:hover td { background: #f9fafb; }
  .cell-genius {
    background: #d1fae5 !important;
    color: #065f46;
    font-weight: 700;
    font-size: 1.1rem;
  }
  .cell-competency {
    background: #fef3c7 !important;
    color: #92400e;
    font-weight: 600;
  }
  .cell-frustration {
    background: #fee2e2 !important;
    color: #991b1b;
    font-weight: 600;
  }
  .team-matrix .totals-row td {
    background: #f3f4f6;
    font-weight: 700;
    color: #1e3a8a;
    border-top: 2px solid #1e3a8a;
  }
  .remove-btn {
    background: none;
    border: none;
    color: #dc2626;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 2px 6px;
    margin-left: 6px;
  }
  .remove-btn:hover { color: #991b1b; }
  .legend {
    display: flex;
    gap: 16px;
    margin: 12px 0;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: #4b5563;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    display: inline-block;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    font-weight: 700;
    text-align: center;
    line-height: 22px;
    font-size: 0.9rem;
  }
  .gap-box {
    background: #fff;
    border-radius: 10px;
    padding: 16px 18px;
    margin: 16px 0;
    border-left: 5px solid #f59e0b;
    background: #fffbeb;
  }
  .gap-box.good {
    border-left-color: #059669;
    background: #ecfdf5;
  }
  .gap-box h4 { color: #92400e; margin-bottom: 8px; }
  .gap-box.good h4 { color: #065f46; }
  .gap-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: 700;
    margin: 3px 4px 3px 0;
  }
  .gap-tag.missing {
    background: #fef2f2;
    color: #991b1b;
    border: 1.5px solid #fca5a5;
  }
  .gap-tag.strong {
    background: #d1fae5;
    color: #065f46;
    border: 1.5px solid #6ee7b7;
  }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  @media (max-width: 600px) {
    .scale { grid-template-columns: repeat(5, 1fr); gap: 4px; }
    .scale-btn { padding: 10px 4px; font-size: 0.68rem; }
    .scale-btn .num { font-size: 1.1rem; }
    header h1 { font-size: 1.4rem; }
    .question-text { font-size: 1rem; }
    .bar-row { grid-template-columns: 90px 1fr 44px; }
  }
</style>
</head>
<body>
<!-- パスワードゲート -->
<div id="gateOverlay" class="gate-overlay">
  <div class="gate-card">
    <div class="gate-icon">🔒</div>
    <h2 id="gateTitle"></h2>
    <p id="gateDesc"></p>
    <input type="password" id="gateInput" class="gate-input" autofocus>
    <div class="gate-error" id="gateError"></div>
    <button class="btn" id="gateBtn" onclick="checkPassword()" style="width:100%;"></button>
    <div class="gate-lang">
      <button class="lang-btn active" data-lang="en">English</button>
      <button class="lang-btn" data-lang="ja">日本語</button>
      <button class="lang-btn" data-lang="zh">中文</button>
    </div>
  </div>
</div>

<div class="container">
  <header>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en">English</button>
      <button class="lang-btn" data-lang="ja">日本語</button>
      <button class="lang-btn" data-lang="zh">中文</button>
    </div>
    <h1 id="headerTitle"></h1>
    <p id="headerSubtitle"></p>
  </header>

  <!-- イントロ画面 -->
  <div id="intro" class="content">
    <div class="intro">
      <h2 id="introTitle"></h2>
      <p id="introP1"></p>
      <p id="introP2"></p>

      <div class="gears-preview" id="gearsPreview"></div>

      <div class="intro-buttons">
        <button class="btn" id="startBtn" onclick="startQuiz()"></button>
        <button class="btn btn-secondary" id="teamMapBtn" onclick="showTeamMap()"></button>
      </div>
    </div>
  </div>

  <!-- 質問画面 -->
  <div id="quiz" class="content hidden">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
    <div class="question-counter" id="counter"></div>
    <div class="question-text" id="questionText"></div>
    <div class="scale" id="scaleContainer"></div>
    <div class="nav-buttons">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()"></button>
      <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled></button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result" class="content hidden">
    <div class="result-hero">
      <h2 id="resultTitle"></h2>
      <p id="resultSubtitle"></p>
    </div>

    <div class="chart-container">
      <div id="chartBars"></div>
    </div>

    <div class="summary-box">
      <h4 id="summaryHeading"></h4>
      <p id="summaryText"></p>
    </div>

    <div class="ranking">
      <div class="rank-section">
        <h3 id="geniusHeading"></h3>
        <p class="section-desc" id="geniusDesc"></p>
        <div id="geniusList"></div>
      </div>
      <div class="rank-section">
        <h3 id="competencyHeading"></h3>
        <p class="section-desc" id="competencyDesc"></p>
        <div id="competencyList"></div>
      </div>
      <div class="rank-section">
        <h3 id="frustrationHeading"></h3>
        <p class="section-desc" id="frustrationDesc"></p>
        <div id="frustrationList"></div>
      </div>
    </div>

    <!-- チーム共有セクション -->
    <div class="share-section">
      <h4 id="shareHeading"></h4>
      <p style="color:#374151; font-size:0.9rem; margin-bottom:12px;" id="shareDesc"></p>
      <div class="share-input-row">
        <input type="text" id="shareName" placeholder="">
        <button class="btn btn-small" id="generateCodeBtn" onclick="generateShareCode()"></button>
      </div>
      <div id="shareCodeBox" class="hidden">
        <div class="share-code" id="shareCodeText"></div>
        <button class="btn btn-small btn-secondary" id="copyCodeBtn" onclick="copyShareCode()"></button>
        <button class="btn btn-small" id="addToMyTeamBtn" onclick="addMyResultToTeam()" style="margin-left:6px;"></button>
        <div class="copy-msg" id="copyMsg"></div>
      </div>
    </div>

    <div class="center">
      <button class="btn btn-secondary" id="restartBtn" onclick="restart()"></button>
      <button class="btn" id="printBtn" onclick="printResult()" style="margin-left:8px;"></button>
    </div>
  </div>

  <!-- チームマップ画面 -->
  <div id="teamMap" class="content hidden">
    <div class="result-hero">
      <h2 id="teamMapTitle"></h2>
      <p id="teamMapSubtitle"></p>
    </div>

    <div class="team-add-box">
      <h3 id="teamAddTitle"></h3>
      <p style="color:#6b7280; font-size:0.88rem; margin-bottom:12px;" id="teamAddDesc"></p>
      <div class="share-input-row">
        <input type="text" id="memberCodeInput" placeholder="">
        <button class="btn btn-small" id="addMemberBtn" onclick="addMemberFromCode()"></button>
      </div>
      <div class="copy-msg" id="addMsg" style="color:#dc2626;"></div>
    </div>

    <div id="teamContent">
      <div class="team-empty" id="teamEmpty">
        <p id="teamEmptyText"></p>
      </div>
    </div>

    <div class="center" style="margin-top:24px;">
      <button class="btn btn-secondary" id="backToHomeBtn" onclick="backToHome()"></button>
      <button class="btn btn-danger btn-small" id="clearTeamBtn" onclick="clearTeam()" style="margin-left:8px;"></button>
      <button class="btn" id="printTeamBtn" onclick="printResult()" style="margin-left:8px;"></button>
    </div>
  </div>

  <div style="text-align:center; padding:14px 20px 20px; font-size:0.72rem; color:#9ca3af; line-height:1.5;">
    Based on <em>The 6 Types of Working Genius: A Better Way to Understand Your Gifts, Your Frustrations, and Your Team</em> by Patrick M. Lencioni.
  </div>
</div>

<script>
// ============= i18n データ =============
const I18N = {
  en: {
    htmlLang: "en",
    pageTitle: "6 Types of Working Genius Assessment",
    headerTitle: "⚙️ 6 Types of Working Genius",
    headerSubtitle: "Discover your gifts, competencies, and frustrations in 10 minutes",
    introTitle: "Find Your Working Genius",
    introP1: "Based on Patrick Lencioni's <strong>'The 6 Types of Working Genius'</strong>, this assessment identifies your <strong>Genius</strong> (where you find joy and energy), <strong>Competency</strong> (areas you can do but drain you), and <strong>Frustration</strong> (areas that exhaust you).",
    introP2: "For each statement, rate how much it applies to you on a 5-point scale. Takes about 5–7 minutes.",
    startBtn: "Start Assessment →",
    counter: (i, n) => `Question ${i} / ${n}`,
    prevBtn: "← Back",
    nextBtn: "Next →",
    finishBtn: "See Results →",
    scaleLabels: [
      "Strongly disagree",
      "Disagree",
      "Neutral",
      "Agree",
      "Strongly agree"
    ],

// ============= 質問生成 =============
function generateQuestions() {
  const list = [];
  ['W','I','D','G','E','T'].forEach(type => {
    T.questions[type].forEach((text, idx) => {
      list.push({ type, idx, text });
    });
  });
  return shuffle(list);
}

function regenerateQuestions() {
  // 既存の順序を保持して、テキストだけ新言語に置き換える
  questions = questions.map(q => ({
    type: q.type,
    idx: q.idx,
    text: T.questions[q.type][q.idx]
  }));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============= クイズ進行 =============
function startQuiz() {
  questions = generateQuestions();
  currentQuestion = 0;
  answers = new Array(questions.length).fill(null);
  isQuizActive = true;
  isResultActive = false;
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('counter').textContent = T.counter(currentQuestion + 1, questions.length);
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressFill').style.width = `${(currentQuestion / questions.length) * 100}%`;

  document.querySelectorAll('.scale-btn').forEach(btn => {
    btn.classList.remove('selected');
    if (answers[currentQuestion] === parseInt(btn.dataset.value)) {
      btn.classList.add('selected');
    }
  });

  document.getElementById('prevBtn').disabled = currentQuestion === 0;
  document.getElementById('nextBtn').disabled = answers[currentQuestion] === null;
  document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? T.finishBtn : T.nextBtn;
}

function nextQuestion() {
  if (answers[currentQuestion] === null) return;
  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    computeAndShowResult();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

// ============= 結果表示 =============
function computeAndShowResult() {
  const scores = { W: 0, I: 0, D: 0, G: 0, E: 0, T: 0 };
  const counts = { W: 0, I: 0, D: 0, G: 0, E: 0, T: 0 };
  questions.forEach((q, i) => {
    scores[q.type] += answers[i];
    counts[q.type]++;
  });
  const avgs = {};
  Object.keys(scores).forEach(k => {
    avgs[k] = scores[k] / counts[k];
  });
  savedScores = avgs;
  isQuizActive = false;
  isResultActive = true;
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  renderResult();
}

function renderResult() {
  if (!savedScores) return;
  const avgs = savedScores;
  const sorted = Object.entries(avgs).sort((a, b) => b[1] - a[1]);
  const top2 = sorted.slice(0, 2);
  const mid2 = sorted.slice(2, 4);
  const bot2 = sorted.slice(4, 6);

  // チャート
  const chartHTML = sorted.map(([type, score]) => {
    const pct = (score / 5) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label">${T.types[type].short}</div>
        <div class="bar-track"><div class="bar-fill" style="width: ${pct}%"></div></div>
        <div class="bar-value">${score.toFixed(2)}</div>
      </div>
    `;
  }).join('');
  document.getElementById('chartBars').innerHTML = chartHTML;

  document.getElementById('geniusList').innerHTML = top2.map(([t, s]) => renderRank(t, s, 'genius')).join('');
  document.getElementById('competencyList').innerHTML = mid2.map(([t, s]) => renderRank(t, s, 'competency')).join('');
  document.getElementById('frustrationList').innerHTML = bot2.map(([t, s]) => renderRank(t, s, 'frustration')).join('');

  // サマリー
  const g1 = T.types[top2[0][0]].short;
  const g2 = T.types[top2[1][0]].short;
  const f1 = T.types[bot2[0][0]].short;
  const f2 = T.types[bot2[1][0]].short;

  const flow = ['W', 'I', 'D', 'G', 'E', 'T'];
  const geniusKeys = top2.map(t => t[0]);
  let flowText;
  if (geniusKeys.every(g => ['W', 'I', 'D'].includes(g))) {
    flowText = T.flowUpstream;
  } else if (geniusKeys.every(g => ['G', 'E', 'T'].includes(g))) {
    flowText = T.flowDownstream;
  } else {
    flowText = T.flowMixed;
  }

  document.getElementById('summaryText').innerHTML = T.summary(g1, g2, f1, f2) + '<br><br>' + flowText;
}

function renderRank(type, score, cls) {
  const info = T.types[type];
  return `
    <div class="rank-item ${cls}">
      <div class="rank-letter">${type}</div>
      <div class="rank-info">
        <div class="title">${info.name}</div>
        <div class="desc">${info.desc}</div>
      </div>
      <div class="rank-score">${score.toFixed(2)} / 5</div>
    </div>
  `;
}

// ============= シェアコード関連 =============
// フォーマット: "WG1|名前|W45|I22|D38|G42|E35|T20"
// スコアは0.1刻み×10で整数化(10〜50)
function encodeScores(name, scores) {
  const cleanName = name.replace(/\|/g, '/').trim().slice(0, 40);
  const parts = ['W','I','D','G','E','T'].map(k => k + Math.round(scores[k] * 10));
  return 'WG1|' + cleanName + '|' + parts.join('|');
}

function decodeCode(code) {
  const trimmed = (code || '').trim();
  if (!trimmed.startsWith('WG1|')) return null;
  const parts = trimmed.split('|');
  if (parts.length !== 8) return null;
  const name = parts[1].trim();
  if (!name) return null;
  const scores = {};
  const keys = ['W','I','D','G','E','T'];
  for (let i = 0; i < 6; i++) {
    const p = parts[i + 2];
    if (!p || p[0] !== keys[i]) return null;
    const v = parseInt(p.slice(1));
    if (isNaN(v) || v < 10 || v > 50) return null;
    scores[keys[i]] = v / 10;
  }
  return { name, scores };
}

function generateShareCode() {
  const name = document.getElementById('shareName').value.trim();
  const msg = document.getElementById('copyMsg');
  if (!name) {
    msg.style.color = '#dc2626';
    msg.textContent = T.enterName;
    return;
  }
  if (!savedScores) return;
  const code = encodeScores(name, savedScores);
  document.getElementById('shareCodeText').textContent = code;
  document.getElementById('shareCodeBox').classList.remove('hidden');
  msg.textContent = '';
}

function copyShareCode() {
  const code = document.getElementById('shareCodeText').textContent;
  const msg = document.getElementById('copyMsg');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => {
      msg.style.color = '#059669';
      msg.textContent = T.copied;
      setTimeout(() => { msg.textContent = ''; }, 2500);
    }).catch(() => fallbackCopy(code, msg));
  } else {
    fallbackCopy(code, msg);
  }
}

function fallbackCopy(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); msg.style.color = '#059669'; msg.textContent = T.copied; }
  catch(e) {}
  document.body.removeChild(ta);
  setTimeout(() => { msg.textContent = ''; }, 2500);
}

function addMyResultToTeam() {
  const code = document.getElementById('shareCodeText').textContent;
  const parsed = decodeCode(code);
  const msg = document.getElementById('copyMsg');
  if (!parsed) return;
  if (teamMembers.some(m => m.name === parsed.name)) {
    // 同名は上書き
    teamMembers = teamMembers.filter(m => m.name !== parsed.name);
  }
  teamMembers.push(parsed);
  saveTeam();
  msg.style.color = '#059669';
  msg.textContent = T.addedToTeam;
  setTimeout(() => { msg.textContent = ''; }, 2500);
}

// 各メンバーのタイプ分類: Genius(top2) / Competency(mid2) / Frustration(bot2)
function classifyMember(scores) {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const classification = {};
  sorted.slice(0, 2).forEach(([k]) => classification[k] = 'genius');
  sorted.slice(2, 4).forEach(([k]) => classification[k] = 'competency');
  sorted.slice(4, 6).forEach(([k]) => classification[k] = 'frustration');
  return classification;
}

function renderTeamMap() {
  const container = document.getElementById('teamContent');
  if (teamMembers.length === 0) {
    container.innerHTML = `<div class="team-empty"><p>${T.teamEmptyText}</p></div>`;
    return;
  }

  const types = ['W','I','D','G','E','T'];

  // マトリクス
  let html = `<h3 style="color:#1e3a8a;margin:20px 0 8px;">${T.matrixHeading}</h3>`;
  html += `<div class="legend">
    <div class="legend-item"><span class="legend-swatch cell-genius">◎</span>${T.legendGenius}</div>
    <div class="legend-item"><span class="legend-swatch cell-competency">○</span>${T.legendCompetency}</div>
    <div class="legend-item"><span class="legend-swatch cell-frustration">×</span>${T.legendFrustration}</div>
  </div>`;

  html += `<div class="table-wrap"><table class="team-matrix"><thead><tr><th>${T.colMember}</th>`;
  types.forEach(t => {
    html += `<th>${t}<br><span style="font-size:0.7rem;font-weight:400;opacity:0.85;">${T.types[t].short}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  // 集計用
  const totals = { W: {g:0,f:0}, I: {g:0,f:0}, D: {g:0,f:0}, G: {g:0,f:0}, E: {g:0,f:0}, T: {g:0,f:0} };

  teamMembers.forEach(m => {
    const cls = classifyMember(m.scores);
    html += `<tr><td>${escapeHtml(m.name)} <button class="remove-btn" onclick="removeMember('${escapeAttr(m.name)}')" title="${T.removeBtn}">${T.removeBtn}</button></td>`;
    types.forEach(t => {
      const c = cls[t];
      let mark = '';
      if (c === 'genius') { mark = '◎'; totals[t].g++; }
      else if (c === 'competency') { mark = '○'; }
      else if (c === 'frustration') { mark = '×'; totals[t].f++; }
      html += `<td class="cell-${c}">${mark}<br><span style="font-size:0.7rem;opacity:0.7;font-weight:400;">${m.scores[t].toFixed(1)}</span></td>`;
    });
    html += `</tr>`;
  });

  // 合計行
  html += `<tr class="totals-row"><td>${T.rowTotalGenius}</td>`;
  types.forEach(t => {
    html += `<td>◎ ${totals[t].g}</td>`;
  });
  html += `</tr>`;
  html += `<tr class="totals-row"><td>${T.rowTotalFrust}</td>`;
  types.forEach(t => {
    html += `<td>× ${totals[t].f}</td>`;
  });
  html += `</tr>`;

  html += `</tbody></table></div>`;

  // ギャップ分析
  const missing = types.filter(t => totals[t].g === 0);
  const strong = types.filter(t => totals[t].g >= Math.max(2, Math.ceil(teamMembers.length / 2)));

  if (missing.length > 0) {
    html += `<div class="gap-box">
      <h4>${T.gapHeading}</h4>
      <p style="color:#92400e;font-size:0.88rem;margin-bottom:8px;">${T.gapMissingDesc}</p>
      <div><strong style="font-size:0.85rem;color:#92400e;">${T.gapMissing}</strong><br>`;
    missing.forEach(t => {
      html += `<span class="gap-tag missing">${t} - ${T.types[t].short}</span>`;
    });
    html += `</div>`;
    if (strong.length > 0) {
      html += `<div style="margin-top:10px;"><strong style="font-size:0.85rem;color:#065f46;">${T.gapStrong}</strong><br>`;
      strong.forEach(t => {
        html += `<span class="gap-tag strong">${t} - ${T.types[t].short}</span>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="gap-box good">
      <h4>${T.gapNoneHeading}</h4>
      <p style="color:#065f46;font-size:0.88rem;">${T.gapBalancedDesc}</p>`;
    if (strong.length > 0) {
      html += `<div style="margin-top:10px;"><strong style="font-size:0.85rem;color:#065f46;">${T.gapStrong}</strong><br>`;
      strong.forEach(t => {
        html += `<span class="gap-tag strong">${t} - ${T.types[t].short}</span>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function escapeAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ============= 初期化 =============
renderStatic();
</script>
</body>
</html>
